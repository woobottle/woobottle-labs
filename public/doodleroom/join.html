<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>낙서방 초대</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex"/>
<meta property="og:title" content="낙서방 초대"/>
<meta property="og:description" content="친구가 낙서방에 초대했어요. 같이 그려요! 🐾"/>
<style>
  :root{ --cream:#FBF6EA; --ink:#14110e; --teal:#4FE0C9; --coral:#FF7A4D; --yellow:#FBD24E; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",system-ui,sans-serif;
    background-image:radial-gradient(rgba(0,0,0,.05) 2px,transparent 2px);background-size:26px 26px;padding:24px}
  .card{width:100%;max-width:360px;background:#fff;border:3px solid var(--ink);border-radius:24px;
    box-shadow:8px 8px 0 var(--ink);padding:32px 26px;text-align:center}
  .paw{font-size:44px}
  h1{font-size:22px;margin:14px 0 6px;letter-spacing:-.5px}
  p{color:#5c5650;font-size:14px;line-height:1.6;margin-bottom:22px}
  a.btn{display:block;text-decoration:none;font-weight:800;font-size:16px;border:3px solid var(--ink);
    border-radius:14px;padding:15px;margin-top:12px;color:var(--ink)}
  .open{background:var(--teal)}
  .store{background:var(--yellow)}
  .code{margin-top:18px;font-size:12px;color:#9a948c}
  .code b{color:var(--ink);font-family:ui-monospace,monospace;letter-spacing:1px}
</style>
</head>
<body>
  <div class="card">
    <div class="paw">🐾</div>
    <h1>낙서방에 초대됐어요</h1>
    <p>친구와 하나의 캔버스에 같이 그리는 앱이에요.<br/>앱에서 열거나, 먼저 설치해 주세요.</p>
    <a class="btn open" id="open" href="#">앱에서 열기</a>
    <a class="btn store" href="https://apps.apple.com/app/id6785241751">App Store에서 받기</a>
    <div class="code" id="codeline"></div>
  </div>
<script>
  (function(){
    var p = new URLSearchParams(location.search);
    var code = p.get('c') || p.get('code') || '';
    var scheme = 'doodleroom://join/' + encodeURIComponent(code);
    var openBtn = document.getElementById('open');
    openBtn.href = scheme;
    if (code) {
      document.getElementById('codeline').innerHTML = '초대 코드 <b>' + code + '</b>';
      // 앱이 설치돼 있으면 바로 열기 시도(유니버설 링크가 안 잡힌 경우 폴백).
      setTimeout(function(){ location.href = scheme; }, 350);
    }
  })();
</script>
</body>
</html>
